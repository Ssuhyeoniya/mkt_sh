<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>블로그 시안 B · Card Grid · 마케팅 CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css?v=20260512-1">
<style>
  /* Option B: Card Grid — 썸네일 우선, 시각적 콘텐츠 검토 */
  .card-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; }
  @media (max-width:1280px){ .card-grid{ grid-template-columns:repeat(2,1fr); } }
  .post-card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; transition:all .2s; cursor:pointer; }
  .post-card:hover{ transform:translateY(-2px); border-color:var(--accent); box-shadow:0 8px 32px rgba(124,92,255,.15); }
  .post-card .cover{ aspect-ratio:16/9; background:var(--panel-2) center/cover no-repeat; position:relative; }
  .post-card .cover .rank{ position:absolute; top:10px; left:10px; background:rgba(0,0,0,.7); color:#fff; padding:3px 9px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:11px; backdrop-filter:blur(6px); }
  .post-card .cover .badge{ position:absolute; top:10px; right:10px; background:rgba(124,92,255,.9); color:#fff; padding:3px 9px; border-radius:6px; font-size:11px; backdrop-filter:blur(6px); }
  .post-card .body{ padding:14px 16px 16px; }
  .post-card .meta-row{ display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:11px; color:var(--muted); }
  .post-card h3{ font-size:14px; font-weight:600; margin:0 0 8px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:39px; }
  .post-card .stats{ display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; padding-top:12px; border-top:1px solid var(--line); }
  .post-card .stats .s{ text-align:center; }
  .post-card .stats .s .l{ font-size:10px; color:var(--muted); }
  .post-card .stats .s .v{ font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; margin-top:2px; }
  .post-card .actions{ display:flex; gap:6px; margin-top:12px; }
  .post-card .actions a{ flex:1; text-align:center; font-size:11.5px; padding:6px 8px; border-radius:6px; border:1px solid var(--line); color:var(--text-2); }
  .post-card .actions a:hover{ border-color:var(--accent); color:var(--accent); }
  .cat-tag-card{ font-size:10.5px; padding:2px 7px; border-radius:4px; background:rgba(124,92,255,.15); color:#b8a6ff; border:1px solid rgba(124,92,255,.3); }
</style>
</head>
<body>
<div class="shell">

  <aside class="sidebar">
    <div class="brand"><div class="brand-mark"></div><div class="brand-name">Marketing CRM</div></div>
    <div class="brand-ver">2026.05 · v1.0</div>
    <div class="nav-section">Overview</div>
    <a class="nav-item" href="../../dashboard/">대시보드</a>
    <div class="nav-section">인바운드</div>
    <a class="nav-item">IB / OB 분석</a>
    <a class="nav-item">IB / OB 종합</a>
    <a class="nav-item" href="../../salesmap/">세일즈맵</a>
    <div class="nav-section">고객사 관리</div>
    <a class="nav-item">성약</a>
    <a class="nav-item">이탈</a>
    <div class="nav-section">제휴점</div>
    <a class="nav-item">제휴점 리스트</a>
    <div class="nav-section">광고</div>
    <a class="nav-item">인앱</a>
    <a class="nav-item">CORP</a>
    <div class="nav-section">SNS</div>
    <a class="nav-item">미리보기</a>
    <a class="nav-item active">블로그</a>
    <a class="nav-item">인스타그램</a>
    <a class="nav-item">링크드인</a>
  </aside>

  <main class="main">
    <div class="page-head">
      <div>
        <div class="page-eyebrow">SNS · 블로그</div>
        <h1>블로그 콘텐츠 갤러리</h1>
      </div>
      <div class="conn">
        <span class="status" id="status">데모 데이터 표시 중</span>
        <input id="gas-url" type="text" placeholder="GAS 프록시 URL을 붙여넣고 [연결]" spellcheck="false"/>
        <button class="btn-disconnect" id="btn-disconnect" style="display:none">해제</button>
        <button class="btn-connect" id="btn-connect">연결</button>
      </div>
    </div>

    <section class="kpi-grid">
      <div class="kpi"><div class="kpi-label">총 게시물</div><div class="kpi-value" id="kpi-count">0</div><div class="kpi-sub" id="kpi-cat">카테고리 0개</div></div>
      <div class="kpi"><div class="kpi-label">누적 방문</div><div class="kpi-value" id="kpi-total">0</div><div class="kpi-sub">전체 합계</div></div>
      <div class="kpi"><div class="kpi-label">주간 방문</div><div class="kpi-value" id="kpi-weekly">0</div><div class="kpi-sub">최근 7일</div></div>
      <div class="kpi"><div class="kpi-label">유입</div><div class="kpi-value" id="kpi-inbound">0</div><div class="kpi-sub">블로그 → 인바운드</div></div>
    </section>

    <!-- Filter: 카테고리 칩 + 검색 + 정렬 -->
    <div class="filter">
      <div class="search">
        <span style="color:var(--muted)">⌕</span>
        <input id="q" type="text" placeholder="제목으로 검색..."/>
      </div>
      <select id="sort">
        <option value="date_desc">최신순</option>
        <option value="visit_desc">누적 방문 많은 순</option>
        <option value="weekly_desc">주간 방문 많은 순</option>
        <option value="inbound_desc">유입 많은 순</option>
      </select>
      <button id="btn-refresh">↻ 새로고침</button>
      <span style="flex:1"></span>
      <span class="chip" id="result-count">0건</span>
    </div>

    <div id="cat-chips" class="filter" style="margin-top:-6px"></div>

    <!-- Cards -->
    <div id="cards" class="card-grid"></div>

    <div class="text-center muted py-6" style="font-size:11.5px;">시안 B · Card Grid · 썸네일 우선의 시각적 콘텐츠 갤러리</div>
  </main>
</div>

<script src="../proxy-client.js?v=20260512-1"></script>
<script>
  let CURRENT_ROWS = [];
  let ACTIVE_CAT = '';

  function fmt(n){ const v = Number(n); return isFinite(v) ? v.toLocaleString('ko-KR') : (n||'-'); }
  function fmtDate(d){ if (!d) return ''; return String(d).slice(0,10); }
  function $(id){ return document.getElementById(id); }
  function setStatus(text, kind){
    const el = $('status');
    el.className = 'status ' + (kind || '');
    el.textContent = text;
  }

  function applyFilter(rows){
    const q = ($('q').value || '').toLowerCase().trim();
    let out = rows.filter(function(r){
      if (ACTIVE_CAT && String(r.category||'') !== ACTIVE_CAT) return false;
      if (q && String(r['제목']||'').toLowerCase().indexOf(q) < 0) return false;
      return true;
    });
    const sort = $('sort').value;
    out.sort(function(a,b){
      if (sort === 'date_desc')    return String(b['날짜']||'').localeCompare(String(a['날짜']||''));
      if (sort === 'visit_desc')   return Number(b.totalVisit||0) - Number(a.totalVisit||0);
      if (sort === 'weekly_desc')  return Number(b.weeklyVisitor||0) - Number(a.weeklyVisitor||0);
      if (sort === 'inbound_desc') return Number(b.inbound||0) - Number(a.inbound||0);
      return 0;
    });
    return out;
  }

  function renderCats(rows){
    const map = {};
    rows.forEach(function(r){ const c = r.category||'미분류'; map[c] = (map[c]||0)+1; });
    const cats = Object.keys(map);
    const wrap = $('cat-chips');
    wrap.innerHTML = '<span class="cat-chip '+(ACTIVE_CAT===''?'active':'')+'" data-cat="">전체 ('+rows.length+')</span>'
      + cats.map(function(c){ return '<span class="cat-chip '+(ACTIVE_CAT===c?'active':'')+'" data-cat="'+c+'">'+c+' ('+map[c]+')</span>'; }).join('');
    wrap.querySelectorAll('.cat-chip').forEach(function(el){
      el.addEventListener('click', function(){
        ACTIVE_CAT = el.dataset.cat || '';
        render(CURRENT_ROWS);
      });
    });
  }

  function render(rows){
    CURRENT_ROWS = rows;

    // KPI
    const tot = rows.reduce((s,r)=>s+Number(r.totalVisit||0),0);
    const wk  = rows.reduce((s,r)=>s+Number(r.weeklyVisitor||0),0);
    const ib  = rows.reduce((s,r)=>s+Number(r.inbound||0),0);
    const cats = Array.from(new Set(rows.map(r=>r.category||'미분류')));
    $('kpi-count').textContent   = fmt(rows.length);
    $('kpi-total').textContent   = fmt(tot);
    $('kpi-weekly').textContent  = fmt(wk);
    $('kpi-inbound').textContent = fmt(ib);
    $('kpi-cat').textContent     = '카테고리 ' + cats.length + '개';

    renderCats(rows);

    const filtered = applyFilter(rows);
    $('result-count').textContent = filtered.length + '건';

    const cards = $('cards');
    if (!filtered.length){
      cards.innerHTML = '<div style="grid-column:1/-1"><div class="empty">조건에 맞는 글이 없습니다.</div></div>';
      return;
    }

    // 누적 방문 기준 상위 3개에 HOT 뱃지
    const ranking = rows.slice().sort((a,b)=>Number(b.totalVisit||0)-Number(a.totalVisit||0));
    const hotIds = new Set(ranking.slice(0,3).map(r=>r.postid));

    cards.innerHTML = filtered.map(function(r,i){
      const cover = r.thumbnail ? `style="background-image:url('${String(r.thumbnail).replace(/'/g,"&apos;")}')"` : '';
      const isHot = hotIds.has(r.postid);
      const link = r['링크'] ? `<a href="${r['링크']}" target="_blank" rel="noopener">↗ 보기</a>` : '<a style="opacity:.4">-</a>';
      return `<article class="post-card">
        <div class="cover" ${cover}>
          <div class="rank">#${i+1}</div>
          ${isHot ? '<div class="badge">🔥 HOT</div>' : ''}
        </div>
        <div class="body">
          <div class="meta-row">
            ${r.category ? '<span class="cat-tag-card">'+r.category+'</span>' : ''}
            <span>${r.service||''}</span>
            <span>·</span>
            <span>${fmtDate(r['날짜'])}</span>
          </div>
          <h3 title="${(r['제목']||'').replace(/"/g,'&quot;')}">${r['제목']||'-'}</h3>
          <div class="stats">
            <div class="s"><div class="l">누적</div><div class="v">${fmt(r.totalVisit)}</div></div>
            <div class="s"><div class="l">주간</div><div class="v">${fmt(r.weeklyVisitor)}</div></div>
            <div class="s"><div class="l">월간</div><div class="v">${fmt(r.monthlyVisitor)}</div></div>
            <div class="s"><div class="l">유입</div><div class="v" style="color:${Number(r.inbound)>=20?'var(--green)':'var(--text)'}">${fmt(r.inbound)}</div></div>
          </div>
          <div class="actions">
            ${link}
            <a>상세</a>
          </div>
        </div>
      </article>`;
    }).join('');
  }

  async function load(){
    const url = MktProxy.getUrl();
    $('gas-url').value = url;
    $('btn-disconnect').style.display = url ? '' : 'none';

    if (!url){
      setStatus('데모 데이터 표시 중', 'demo');
      render(SAMPLE_BLOG);
      return;
    }
    try{
      setStatus('연결 중...');
      const data = await MktProxy.blogList();
      render(data.rows || []);
      setStatus('● 연결됨 · ' + (data.total || 0) + '건', 'ok');
    }catch(err){
      setStatus('연결 실패: ' + err.message, 'err');
      render(SAMPLE_BLOG);
    }
  }

  $('btn-connect').addEventListener('click', function(){
    const v = $('gas-url').value.trim();
    if (!v) return;
    MktProxy.setUrl(v); load();
  });
  $('btn-disconnect').addEventListener('click', function(){
    MktProxy.setUrl(''); $('gas-url').value=''; $('btn-disconnect').style.display='none'; load();
  });
  $('btn-refresh').addEventListener('click', load);
  $('q').addEventListener('input',     function(){ render(CURRENT_ROWS); });
  $('sort').addEventListener('change', function(){ render(CURRENT_ROWS); });

  window.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
